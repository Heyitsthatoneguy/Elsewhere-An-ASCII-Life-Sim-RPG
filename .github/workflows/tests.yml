name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"

    defaults:
      run:
        working-directory: ascii_farmstead_v154

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile source
        shell: pwsh
        run: python -m compileall -q .

      - name: Run farmstead smoke tests
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .ci-temp | Out-Null
          python -W error -c "import tempfile; from pathlib import Path; tempfile.tempdir = str((Path.cwd() / '.ci-temp').resolve()); import smoke_test; raise SystemExit(smoke_test.main())"

      - name: Run combat smoke tests
        run: python -W error -m ascii_battle_prototype.combat.smoke_tests

      - name: Validate tactical content
        run: python -m ascii_battle_prototype.combat.main --validate-content
